<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light" />
    <title>生命优化实验手册</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
        background: linear-gradient(165deg, #e4edf7 0%, #d9e3f0 55%, #ddd8eb 100%);
        color: #1f2937;
        padding: 24px 20px 40px;
      }
      .card {
        max-width: 420px;
        margin: 0 auto;
        padding: 24px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.75);
        border: 1px solid rgba(255, 255, 255, 0.35);
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.35rem;
        font-weight: 600;
      }
      .sub {
        margin: 0 0 20px;
        font-size: 0.85rem;
        color: #64748b;
        line-height: 1.5;
      }
      a.btn {
        display: inline-block;
        width: 100%;
        text-align: center;
        padding: 12px 16px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid rgba(148, 163, 184, 0.45);
        color: #0f172a;
        text-decoration: none;
        font-weight: 500;
        font-size: 0.95rem;
      }
      a.btn:active {
        opacity: 0.92;
      }
      .note {
        margin-top: 16px;
        font-size: 0.75rem;
        color: #64748b;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>生命优化实验手册</h1>
      <p class="sub">若在微信小程序 web-view 中打开本页，可点击下方进入完整 Web 版（需已部署 HTTPS 且域名已加入业务域名）。</p>
      <a class="btn" href="/">进入完整应用</a>
      <p class="note">单独在浏览器打开本站时，按钮会跳转到站点首页。部署时请把本文件一并随 Next 静态资源发布。</p>
    </div>
  </body>
</html>
